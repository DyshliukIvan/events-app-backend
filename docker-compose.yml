services:
  postgres:
    image: postgres:16-alpine
    container_name: eventapp-postgres
    environment:
      POSTGRES_DB: eventapp
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - eventapp-postgres-data:/var/lib/postgresql/data

volumes:
  eventapp-postgres-data:
